name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Lets you re-deploy from the Actions tab without pushing a commit.
  workflow_dispatch:

# Allow one deploy at a time, and let a newer push cancel a running one.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The generated data files are committed, so the build needs neither the
      # 257 MB UN download nor the Natural Earth fetch.
      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
